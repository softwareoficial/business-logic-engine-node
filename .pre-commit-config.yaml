repos:
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: npx prettier --write
        language: system
        files: \.(js|ts|json|md)$
      - id: eslint
        name: ESLint
        entry: npx eslint --fix
        language: system
        files: \.(js|ts)$
      - id: typescript-check
        name: TypeScript Check
        entry: npm run build
        language: system
        pass_filenames: false
        always_run: true
